name: Release macOS Universal

on:
  push:
    tags:
      - "v*"

# The default GITHUB_TOKEN is read-only; creating/uploading a Release needs write.
permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'frontend/ui/pnpm-lock.yaml'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build JS
        working-directory: ./frontend/ui
        run: |
          pnpm install
          pnpm build
      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin --bin GwenLand-IDE
      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin --bin GwenLand-IDE
      - name: Create Universal Binary
        run: |
          mkdir -p target/universal/release
          lipo -create -output target/universal/release/GwenLand-IDE \
            target/x86_64-apple-darwin/release/GwenLand-IDE \
            target/aarch64-apple-darwin/release/GwenLand-IDE
      - name: Upload to GH Releases
        uses: softprops/action-gh-release@v2
        with:
          files: target/universal/release/GwenLand-IDE
