name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'frontend/ui/pnpm-lock.yaml'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install JS deps
        working-directory: ./frontend/ui
        run: pnpm install
      - name: Build JS
        working-directory: ./frontend/ui
        run: pnpm build
      - name: Rustfmt
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build release (for size check)
        run: cargo build --release --bin GwenLand-IDE
      - name: Binary size check
        run: |
          SIZE=$(stat -c%s "target/release/GwenLand-IDE")
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "Binary size is $SIZE_MB MB"
          if (( $(echo "$SIZE > 20971520" | bc -l) )); then
            echo "::error::Binary size exceeds hard limit of 20MB! ($SIZE_MB MB)"
            exit 1
          elif (( $(echo "$SIZE > 15728640" | bc -l) )); then
            echo "::warning::Binary size exceeds warning limit of 15MB. ($SIZE_MB MB)"
          fi
