name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: gwenland-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: gwenland-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gwenland-windows-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: gwenland-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gwenland-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/ui/pnpm-lock.yaml

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: frontend/ui
        run: pnpm install --frozen-lockfile

      - name: Build frontend bundle
        working-directory: frontend/ui
        run: pnpm build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri app
        working-directory: frontend
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p "release/${{ matrix.artifact }}"
          cp -R "target/${{ matrix.target }}/release/bundle/." "release/${{ matrix.artifact }}/" 2>/dev/null || true
          find "target/${{ matrix.target }}/release" -maxdepth 1 -type f -name "GwenLand-IDE*" -exec cp {} "release/${{ matrix.artifact }}/" \; 2>/dev/null || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ matrix.artifact }}/**

  macos-universal:
    name: Build macOS universal binary
    runs-on: macos-latest
    needs: build
    steps:
      - name: Download macOS x64
        uses: actions/download-artifact@v4
        with:
          name: gwenland-macos-x64
          path: macos-x64

      - name: Download macOS arm64
        uses: actions/download-artifact@v4
        with:
          name: gwenland-macos-arm64
          path: macos-arm64

      - name: Create universal binary
        run: |
          X64_BIN="$(find macos-x64 -type f -perm -111 -name 'GwenLand-IDE*' | head -n 1)"
          ARM64_BIN="$(find macos-arm64 -type f -perm -111 -name 'GwenLand-IDE*' | head -n 1)"
          mkdir -p release/gwenland-macos-universal
          lipo -create "$X64_BIN" "$ARM64_BIN" -output release/gwenland-macos-universal/gwenland-macos-universal

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: gwenland-macos-universal
          path: release/gwenland-macos-universal

      - name: Upload universal binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/gwenland-macos-universal/gwenland-macos-universal
