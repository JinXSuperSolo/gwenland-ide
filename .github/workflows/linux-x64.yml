name: Release Linux x64

on:
  push:
    tags:
      - "v*"

# The default GITHUB_TOKEN is read-only; creating/uploading a Release needs write.
permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'frontend/ui/pnpm-lock.yaml'
      - name: Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # glibc, not musl: the WebKit/GTK stack Tauri links has no musl build.
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked
      - name: Install JS deps
        working-directory: ./frontend/ui
        run: pnpm install
      - name: Build
        working-directory: ./frontend
        run: cargo tauri build --no-bundle --target x86_64-unknown-linux-gnu
      - name: Upload to GH Releases
        uses: softprops/action-gh-release@v2
        with:
          files: target/x86_64-unknown-linux-gnu/release/GwenLand-IDE
