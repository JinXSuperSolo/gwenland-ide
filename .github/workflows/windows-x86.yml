name: Release Windows x86

on:
  push:
    tags:
      - "v*"

# The default GITHUB_TOKEN is read-only; creating/uploading a Release needs write.
permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'frontend/ui/pnpm-lock.yaml'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked
      - name: Install JS deps
        working-directory: ./frontend/ui
        run: pnpm install
      - name: Build
        working-directory: ./frontend
        run: cargo tauri build --no-bundle --target i686-pc-windows-msvc
      - name: Upload to GH Releases
        uses: softprops/action-gh-release@v2
        with:
          files: target/i686-pc-windows-msvc/release/GwenLand-IDE.exe
